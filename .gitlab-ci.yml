# GitLab CI/CD Pipeline for Electricity Demand Forecasting Service

stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHONUNBUFFERED: "1"

# Cache pip dependencies
cache:
  key: "${CI_JOB_NAME}"
  paths:
    - .cache/pip
    - .venv/

# Default image
default:
  image: python:3.11-slim

# Lint Stage
lint:
  stage: lint
  before_script:
    - pip install ruff black mypy
    - pip install -e ".[dev]"
  script:
    - echo "Running Ruff linter..."
    - ruff check src/ tests/
    - echo "Running Black formatter check..."
    - black --check src/ tests/
    - echo "Running MyPy type checker..."
    - mypy src/forecast_service --ignore-missing-imports
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Test Stage
test:
  stage: test
  before_script:
    - apt-get update && apt-get install -y libgomp1
    - pip install -e ".[dev]"
  script:
    - echo "Running pytest with coverage..."
    - pytest tests/ -v --cov=src/forecast_service --cov-report=xml --cov-report=term-missing --cov-fail-under=80
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    paths:
      - coverage.xml
      - htmlcov/
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Integration Tests
test:integration:
  stage: test
  services:
    - name: python:3.11-slim
      alias: mlflow
      command: ["bash", "-c", "pip install mlflow && mlflow server --host 0.0.0.0 --port 5000"]
  before_script:
    - apt-get update && apt-get install -y libgomp1 curl
    - pip install -e ".[dev]"
  script:
    - echo "Running integration tests..."
    - pytest tests/integration/ -v --timeout=300
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  allow_failure: true

# Build Stage
build:docker:
  stage: build
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image..."
    - docker build -t $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA .
    - docker tag $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA $CI_REGISTRY_IMAGE:latest
    - echo "Pushing Docker image..."
    - docker push $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - lint
    - test

# Build Python Package
build:package:
  stage: build
  script:
    - pip install build
    - python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# Deploy Stage (example for staging)
deploy:staging:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to staging environment..."
    # Add deployment commands here
    # - kubectl apply -f k8s/staging/
  environment:
    name: staging
    url: https://staging.forecast.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - build:docker
  when: manual

# Deploy Stage (production)
deploy:production:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to production environment..."
    # Add deployment commands here
  environment:
    name: production
    url: https://forecast.example.com
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build:docker
  when: manual
